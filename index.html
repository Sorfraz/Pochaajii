<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Pasandida Aurat ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e);
    font-family:'Segoe UI',sans-serif;
}

.card{
    width:90%;
    max-width:700px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:40px;
    text-align:center;
    color:white;
    box-shadow:0 0 40px rgba(255,255,255,0.15);
}

.heart{
    font-size:70px;
    animation:beat 1.2s infinite;
}

h1{
    margin-top:10px;
    color:#ff7eb3;
}

.message{
    margin-top:25px;
    font-size:22px;
    line-height:1.8;
    min-height:250px;
}

.signature{
    margin-top:25px;
    font-size:20px;
    color:#ffd6e7;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.25);}
    100%{transform:scale(1);}
}

.stars span{
    position:absolute;
    color:white;
    animation:float 8s linear infinite;
    opacity:.8;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    to{
        transform:translateY(-100px);
        opacity:1;
    }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="card">
    <div class="heart">❤️</div>
    <h1>To My Pasandida Aurat ❤️</h1>

    <div class="message" id="text"></div>

    <div class="signature">
        Forever Yours ♾️❤️
    </div>
</div>

<script>
const msg = `Mujhe kisise mohabbat nahi tere siva 💝

Mujhe kisiki zaroorat nahi tere siva 👫

Jo is DIL ❤️ aur ZINDAGI ✨️ par raaj kare,
kisi aur ko ijazat nahi hai tere siva ❤️

Aap hi wahi insaan ho jii... jiske sath
mere zindagi ko guzarne ka khawab dekh rahe hai 😌❤️`;

let i = 0;
const text = document.getElementById("text");

function typeWriter(){
    if(i < msg.length){
        text.innerHTML += msg.charAt(i);
        i++;
        setTimeout(typeWriter,40);
    }
}
typeWriter();

const stars = document.getElementById("stars");

for(let i=0;i<40;i++){
    let star = document.createElement("span");
    star.innerHTML = Math.random()>0.5 ? "❤️" : "✨";
    star.style.left = Math.random()*100 + "%";
    star.style.fontSize = (15 + Math.random()*20) + "px";
    star.style.animationDuration = (5 + Math.random()*8) + "s";
    stars.appendChild(star);
}
</script>

</body>
</html>
